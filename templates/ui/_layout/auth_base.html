<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="application-name" content="Yuplan" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Yuplan" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
  <title>{% block page_title %}Logga in{% endblock %}</title>
  {% set icon_version = asset_version|default('icon-20260310') %}
  <link rel="manifest" href="/manifest.webmanifest?v={{ icon_version }}">
  <link rel="icon" href="/favicon.ico?v={{ icon_version }}">
  <link rel="shortcut icon" href="/favicon.ico?v={{ icon_version }}">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v={{ icon_version }}" sizes="180x180">
  <link rel="mask-icon" href="/static/safari-pinned-tab.svg?v={{ icon_version }}" color="#111827">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app_shell.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
  {% block head_extra %}{% endblock %}
  <script src="{{ url_for('static', filename='js/app_shell.js') }}" defer></script>
</head>
<body>
  <div class="app-shell app-shell--full app-shell--auth" aria-label="Yuplan authentication">
    <div class="auth-shell">
      <div class="auth-shell__theme">
        <button class="app-shell__theme-toggle auth-shell__theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false" data-theme-toggle>
          <span data-theme-icon>🌙</span>
        </button>
      </div>
      <main class="auth-shell__main">
        <section class="app-shell__card">
          {% block content %}{% endblock %}
        </section>
      </main>
    </div>
  </div>
</body>
</html>

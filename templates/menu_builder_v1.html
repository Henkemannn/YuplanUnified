<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menu Builder v1</title>
  <link rel="stylesheet" href="/static/css/builder.css">
  <style>
    body {
      font-family: Georgia, "Times New Roman", serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(180deg, #f7f3ec 0%, #f2f6f8 100%);
      color: #213243;
    }
    .menu-shell {
      display: grid;
      gap: 14px;
      max-width: 1180px;
      margin: 0 auto;
    }
    .menu-card {
      border: 1px solid #d5e0ea;
      border-radius: 16px;
      background: #ffffff;
      padding: 14px;
      box-shadow: 0 8px 20px rgba(35, 56, 74, 0.08);
    }
    .menu-topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .menu-topbar h1,
    .menu-card h2,
    .menu-card h3 {
      margin: 0;
    }
    .menu-inline {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .menu-inline button,
    .menu-inline input,
    .menu-inline select {
      width: auto;
      margin: 0;
    }
    .menu-inline input {
      min-width: 220px;
    }
    .menu-meta {
      margin-top: 6px;
      font-size: 12px;
      color: #4c6174;
    }
    .menu-sections {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }
    .menu-section {
      border: 1px solid #d8e2ea;
      border-radius: 12px;
      background: #fbfdff;
      padding: 10px;
    }
    .menu-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .menu-section-name {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    .menu-section-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .menu-section-actions button {
      width: auto;
      margin: 0;
      padding: 7px 10px;
    }
    .menu-dish-list {
      display: grid;
      gap: 8px;
    }
    .menu-slot-row {
      border: 1px solid #dde6ee;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: grid;
      gap: 8px;
    }
    .menu-slot-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .menu-slot-name {
      font-size: 14px;
      font-weight: 600;
      color: #2a4256;
      margin: 0;
    }
    .menu-slot-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .menu-slot-actions button {
      width: auto;
      margin: 0;
      padding: 6px 10px;
    }
    .menu-dish-row {
      border: 1px solid #dde6ee;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .menu-dish-label {
      font-weight: 600;
    }
    .menu-dish-meta {
      font-size: 12px;
      color: #5b6f80;
      margin-top: 3px;
    }
    .menu-dish-row button {
      width: auto;
      margin: 0;
      padding: 6px 10px;
    }
    .menu-empty {
      border: 1px dashed #cad7e3;
      border-radius: 10px;
      background: #f7fbff;
      color: #536778;
      padding: 10px;
      font-size: 13px;
    }
    .menu-library-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }
    .menu-library-item {
      border: 1px solid #d7e1e9;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .menu-library-item button {
      width: auto;
      margin: 0;
      padding: 6px 10px;
    }
    .menu-library-item-meta {
      font-size: 12px;
      color: #5b6f80;
      margin-top: 3px;
    }
    .menu-picker-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      max-height: 340px;
      overflow-y: auto;
    }
    .menu-picker-item {
      border: 1px solid #d8e1ea;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .menu-picker-item button {
      width: auto;
      margin: 0;
      padding: 6px 10px;
    }
    .menu-feedback {
      margin-top: 10px;
      border: 1px solid #dde5ed;
      border-radius: 10px;
      background: #f6f8fb;
      color: #475868;
      font-size: 12px;
      white-space: pre-wrap;
      padding: 8px 10px;
    }
    .menu-feedback:empty {
      display: none;
    }
    .hidden {
      display: none;
    }
    .menu-template-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-top: 8px;
    }
    .menu-template-grid label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: #4f6273;
    }
    .menu-template-grid input,
    .menu-template-grid select {
      width: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="menu-shell">
    <section class="menu-card menu-topbar">
      <div>
        <h1>Menu Builder v1.1</h1>
        <p class="menu-meta">Flexible sections with dish lists. No fixed weekdays or Alt slots required.</p>
      </div>
      <div class="menu-inline">
        <button id="btnNewMenu" type="button">New menu</button>
      </div>
    </section>

    <section class="menu-card">
      <h2>Create Menu</h2>
      <div class="menu-inline">
        <label>Name
          <input id="menuTitle" type="text" placeholder="Spring event menu">
        </label>
        <button id="btnCreateMenu" type="button">Save menu</button>
      </div>
      <p class="menu-meta" id="activeMenuMeta">No active menu</p>
      <div id="createMenuOut" class="menu-feedback" aria-live="polite"></div>
    </section>

    <section class="menu-card">
      <h2>Template Builder</h2>
      <p class="menu-meta">Generate editable empty structure. Sections and slot labels can be renamed later.</p>
      <div class="menu-template-grid">
        <label>Menu type / intent
          <select id="menuTemplateType">
            <option value="weekly_lunch">Weekly lunch menu</option>
            <option value="free_menu">Free menu</option>
            <option value="event_proposal">Event/proposal menu</option>
            <option value="a_la_carte">A la carte menu</option>
          </select>
        </label>
        <label>Number of sections / days
          <input id="menuTemplateSectionCount" type="number" min="1" max="30" value="3">
        </label>
        <label>Slots / options per section
          <input id="menuTemplateSlotCount" type="number" min="1" max="20" value="2">
        </label>
      </div>
      <div class="menu-inline" style="margin-top:8px;">
        <button id="btnApplyTemplateBuilder" type="button">Generate structure</button>
      </div>
      <div id="menuTemplateOut" class="menu-feedback" aria-live="polite"></div>
    </section>

    <section class="menu-card">
      <div class="menu-topbar">
        <h2>Menu Sections</h2>
        <div class="menu-inline">
          <input id="newSectionName" type="text" placeholder="Section name (e.g. Monday lunch)">
          <button id="btnAddSection" type="button">Add section</button>
          <button id="btnRefreshSections" type="button">Refresh</button>
        </div>
      </div>
      <div id="menuSections" class="menu-sections"></div>
      <div id="menuSectionsOut" class="menu-feedback" aria-live="polite"></div>
    </section>

    <section class="menu-card">
      <h2>Menu Library</h2>
      <div class="menu-inline">
        <button id="btnRefreshMenuLibrary" type="button">Refresh menu library</button>
      </div>
      <div id="menuLibraryList" class="menu-library-list"></div>
      <div id="menuLibraryOut" class="menu-feedback" aria-live="polite"></div>
    </section>
  </div>

  <div id="dishPickerModal" class="modal hidden">
    <div class="modal-content modal-content-components">
      <div class="workspace-modal-header">
        <div>
          <p class="workspace-modal-kicker">Dish picker</p>
          <h3>Add dish to slot</h3>
        </div>
        <button id="dishPickerClose" type="button">Done</button>
      </div>
      <p class="menu-meta" id="dishPickerSectionMeta"></p>
      <p class="menu-meta" id="dishPickerSlotMeta"></p>
      <label>Search dishes
        <input id="dishPickerSearch" type="text" placeholder="Search dish by name">
      </label>
      <div id="dishPickerList" class="menu-picker-list"></div>
      <div id="dishPickerOut" class="menu-feedback" aria-live="polite"></div>
    </div>
  </div>

  <script src="/static/js/menu_builder_v1.js"></script>
</body>
</html>

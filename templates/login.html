{% extends "ui/_layout/auth_base.html" %}

{% block page_title %}Logga in{% endblock %}

{% block head_extra %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
  <div class="login-content">
    <div class="login-logo-wrapper">
      <img src="{{ url_for('static', filename='img/logo-proposal.svg') }}" alt="Yuplan" class="login-logo-spin">
    </div>
    <h1 class="login-title">Logga in</h1>
    {% if vm.error or error_message %}
      <p class="login-error">{{ vm.error or error_message }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('auth.login') }}" class="login-form">
      {{ csrf_token_input()|safe }}
      <div class="login-form-row">
        <label for="email">E-post</label>
        <input type="email" id="email" name="email" required autocomplete="username">
      </div>
      <div class="login-form-row">
        <label for="password">Lösenord</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <div class="login-actions">
        <button type="submit" class="login-submit">Logga in</button>
        <a class="login-forgot" href="{{ url_for('auth.forgot_password') }}">Glömt lösenord?</a>
      </div>
    </form>
  </div>
{% endblock %}
